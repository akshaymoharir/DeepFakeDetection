# ============================================================
# Train Configuration — Small FF++ Ablation Study
# ============================================================
# Designed for quick, meaningful comparisons on a compact subset.

# ------ Model ------
model:
  name: hsf_cvit
  pretrained_spatial: true
  freeze_spatial_epochs: 2
  spatial_out_dim: 512
  freq_out_dim: 256
  fusion_heads: 4
  fusion_dim: 256
  dropout: 0.3

# ------ Data ------
data:
  config: configs/dataset_config.yaml
  frames_per_clip: 4
  image_size: 224
  num_workers: 4
  pin_memory: true
  methods:
    - Deepfakes
    - Face2Face
  real_dir: real
  ablation:
    # Balanced, small-by-default subset sizes.
    # Effective train size is roughly:
    #   real_train + len(methods) * fake_train_per_method
    max_real_videos_per_split:
      train: 64
      val: 16
      test: 16
    max_fake_videos_per_method_per_split:
      train: 64
      val: 16
      test: 16
    subset_seed: 42

# ------ Training ------
training:
  epochs: 15
  batch_size: 8
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 2
  lr_schedule: cosine
  gradient_clip: 1.0
  label_smoothing: 0.1
  amp: true

# ------ Checkpoints ------
checkpoints:
  dir: outputs/ablation_checkpoints
  save_every: 5
  early_stop_patience: 5
  keep_last: 2

# ------ Logging ------
logging:
  tensorboard_dir: outputs/ablation_runs
  log_interval: 10
  csv_log: outputs/ablation_training_log.csv

# ------ Reproducibility ------
seed: 42
