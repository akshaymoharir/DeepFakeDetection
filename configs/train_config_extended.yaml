# ============================================================
# Train Configuration — HSF-CVIT DeepFake Detection
# Extended FF++ profile
# ============================================================

# ------ Model ------
model:
  name: hsf_cvit
  pretrained_spatial: true
  freeze_spatial_epochs: 2
  spatial_out_dim: 512
  freq_out_dim: 256
  fusion_heads: 4
  fusion_dim: 256
  dropout: 0.3

# ------ Data ------
data:
  config: configs/dataset_config_extended.yaml
  frames_per_clip: 1
  image_size: 224
  num_workers: 4
  pin_memory: true
  balance_strategy: weighted_sampler
  methods:
    - Deepfakes
    - Face2Face
    - FaceSwap
    - NeuralTextures
    - FaceShifter
    - DeepFakeDetection
  real_dir: real

# ------ Training ------
training:
  epochs: 50
  batch_size: 16
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 5
  lr_schedule: cosine
  gradient_clip: 1.0
  label_smoothing: 0.1
  amp: true

evaluation:
  decision_threshold: 0.5
  deterministic_eval: true
  eval_frames_per_clip: 1
  eval_frame_strategy: center
  optimize_threshold: true
  threshold_metric: balanced_accuracy
  threshold_min: 0.05
  threshold_max: 0.95
  threshold_step: 0.01
  save_reports: true
  report_dir: outputs/evaluation_extended

# ------ Checkpoints ------
checkpoints:
  dir: outputs/checkpoints_extended
  save_every: 5
  early_stop_patience: 10
  keep_last: 3

# ------ Logging ------
logging:
  tensorboard_dir: outputs/runs_extended
  log_interval: 10
  csv_log: outputs/training_log_extended.csv

# ------ Reproducibility ------
seed: 42
