# ============================================================
# Dataset Configuration — DeepFake Detection
# ============================================================
# Paths are relative to the project root unless stated otherwise.
# Override with environment variables or CLI flags at runtime.

# ------ FaceForensics++ ------
faceforensics:
  root_dir: "data"
  compression: "c23"                   # c0 (raw) | c23 (HQ) | c40 (LQ)
  manipulation_methods:
    - "Deepfakes"
    - "Face2Face"
    - "FaceShifter"
    - "DeepFakeDetection"
  original_dir: "original_sequences/youtube"
  # Optionally include actors as additional real videos during extraction.
  # Frames from all listed sources are merged into <output_dir>/real.
  original_dirs:
    - "original_sequences/youtube"
    - "original_sequences/actors"
  manipulated_dir: "manipulated_sequences"
  frame_extraction:
    enabled: true
    max_frames_per_video: 32           # uniform sampling across video
    output_dir: "data/frames"
  splits:
    train: [0, 720]                    # video indices
    val: [720, 860]
    test: [860, 1000]

# ------ Celeb-DF (v2) ------
celeb_df:
  root_dir: "data/Celeb-DF-v2"
  real_dirs:
    - "Celeb-real"
    - "YouTube-real"
  fake_dir: "Celeb-synthesis"
  test_list: "List_of_testing_videos.txt"
  frame_extraction:
    enabled: true
    max_frames_per_video: 32
    output_dir: "data/Celeb-DF-v2/frames"

# ------ Common ------
common:
  image_size: 224                      # resize target (H x W)
  face_crop: true                     # extract face ROI before saving frames
  random_seed: 42
  num_workers: 4
