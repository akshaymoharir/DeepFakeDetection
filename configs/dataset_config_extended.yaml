# ============================================================
# Dataset Configuration — DeepFake Detection
# Extended FF++ profile with extra sources and methods
# ============================================================

# ------ FaceForensics++ ------
faceforensics:
  profile: "ffpp_extended"
  root_dir: "data"
  compression: "c23"                   # c0 (raw) | c23 (HQ) | c40 (LQ)
  split_mode: "numeric"               # actor / extended sources need fallback split inference
  manipulation_methods:
    - "Deepfakes"
    - "Face2Face"
    - "FaceSwap"
    - "NeuralTextures"
    - "FaceShifter"
    - "DeepFakeDetection"
  original_dir: "original_sequences/youtube"
  # Extended profile can merge additional real videos from the actors subset.
  original_dirs:
    - "original_sequences/youtube"
    - "original_sequences/actors"
  manipulated_dir: "manipulated_sequences"
  frame_extraction:
    enabled: true
    max_frames_per_video: 32
    output_dir: "data/frames_ffpp_extended"
  splits:
    train: [0, 720]
    val: [720, 860]
    test: [860, 1000]

# ------ Celeb-DF (v2) ------
celeb_df:
  root_dir: "data/Celeb-DF-v2"
  real_dirs:
    - "Celeb-real"
    - "YouTube-real"
  fake_dir: "Celeb-synthesis"
  test_list: "List_of_testing_videos.txt"
  frame_extraction:
    enabled: true
    max_frames_per_video: 32
    output_dir: "data/Celeb-DF-v2/frames"

# ------ Common ------
common:
  image_size: 224
  face_crop: true
  random_seed: 42
  num_workers: 4
