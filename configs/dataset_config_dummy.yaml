# ============================================================
# Dataset Configuration — DUMMY DATA (for testing)
# ============================================================
# Points to generated dummy datasets. Use this for testing
# the pipeline before real data arrives.
#
# Usage:
#   python scripts/explore_dataset.py --config configs/dataset_config_dummy.yaml
#   python scripts/plot_samples.py --config configs/dataset_config_dummy.yaml
# ============================================================

# ------ Dummy FaceForensics++ ------
faceforensics:
  root_dir: "data/dummy_FaceForensics"
  compression: "c23"
  manipulation_methods:
    - "Deepfakes"
    - "Face2Face"
    - "FaceSwap"
    - "NeuralTextures"
  original_dir: "original_sequences/youtube"
  manipulated_dir: "manipulated_sequences"
  frame_extraction:
    enabled: true
    max_frames_per_video: 16
    output_dir: "data/dummy_FaceForensics/frames"
  splits:
    train: [0, 14]
    val: [14, 17]
    test: [17, 20]

# ------ Dummy Celeb-DF (v2) ------
celeb_df:
  root_dir: "data/dummy_Celeb_DF_v2"
  real_dirs:
    - "Celeb-real"
    - "YouTube-real"
  fake_dir: "Celeb-synthesis"
  test_list: "List_of_testing_videos.txt"
  frame_extraction:
    enabled: true
    max_frames_per_video: 16
    output_dir: "data/dummy_Celeb_DF_v2/frames"

# ------ Common ------
common:
  image_size: 224
  face_crop: false           # no face detector needed for dummy data
  random_seed: 42
  num_workers: 2
