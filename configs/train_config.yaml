# ============================================================
# Train Configuration — HSF-CVIT DeepFake Detection
# ============================================================
# Switch data.config to dataset_config.yaml once FF++ is ready.
# All paths are relative to the project root.

# ------ Model ------
model:
  name: hsf_cvit
  spatial_backbone: tf_efficientnet_b7  # timm name — tf_efficientnet_b7 (66M) | efficientnet_b4 (18.5M)
  pretrained_spatial: true          # download ImageNet weights for the spatial backbone
  freeze_spatial_epochs: 2          # freeze backbone for first N epochs (warm up freq branch)
  spatial_out_dim: 512              # projection dim from spatial branch
  freq_out_dim: 256                 # projection dim from frequency branch
  fusion_heads: 4                   # cross-attention heads
  fusion_dim: 256                   # internal transformer dim
  dropout: 0.4                      # was 0.3 — bumped for B7 anti-overfit
  srm_learnable: true               # train SRM front-end (init from classical SRM kernels)

# ------ Data ------
data:
  config: configs/dataset_config.yaml
  frames_per_clip: 1                # frames averaged per sample (keep 1 — averaging washes artifacts)
  train_items_per_clip: 2           # fast-iteration value; raise to 8 for the final long run
  image_size: 380
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4
  balance_strategy: weighted_sampler  # none | weighted_sampler — required, dataset is 4:1 fake:real
  # FF++ manipulation methods to include (any subset available under data/frames)
  methods:
    - Deepfakes
    - Face2Face
    - FaceSwap
    - NeuralTextures
  real_dir: real

# ------ Training ------
training:
  epochs: 30                        # was 60 — fast-iteration; raise to 60 for final long run
  batch_size: 16                     # B7 @ 380px on a 24GB GPU; raise to 16 if image_size=320, 32 if backbone=efficientnet_b4
  optimizer: adamw                  # adamw | adam | sgd
  lr: 1.0e-4                        # B7 fine-tunes at ~1e-4; 3e-4 overshoots with bs=8 + fp16 AMP
  weight_decay: 5.0e-4              # was 1e-4 — 5× stronger L2 to fight B7 overfit
  warmup_epochs: 4                  # was 8 — proportional to shorter run; raise to 8 for final long run
  lr_schedule: cosine               # cosine | step | plateau
  gradient_clip: 1.0
  label_smoothing: 0.10             # was 0.05 — caps confident-wrong predictions (val-loss-climb fix)
  pos_weight: null                   # upweight missed fakes in BCE to push output probabilities higher
  amp: true                         # mixed-precision (fp16) — requires CUDA

# ------ Evaluation ------
evaluation:
  decision_threshold: 0.5
  deterministic_eval: true         # use fixed frame selection for val/test
  eval_frames_per_clip: 1          # stable single-frame evaluation per clip
  eval_frame_strategy: center      # center | uniform
  optimize_threshold: true
  threshold_metric: balanced_accuracy
  threshold_min: 0.05
  threshold_max: 0.95
  threshold_step: 0.01
  save_reports: true
  report_dir: outputs/evaluation

# ------ Checkpoints ------
checkpoints:
  dir: outputs/checkpoints
  save_every: 5                     # epochs between periodic saves
  early_stop_patience: 8            # was 15 — proportional to shorter run; raise to 15 for final long run
  keep_last: 3                      # keep only the last N periodic checkpoints

# ------ Logging ------
logging:
  tensorboard_dir: outputs/runs
  log_interval: 10                  # log metrics every N batches
  csv_log: outputs/training_log.csv

# ------ Reproducibility ------
seed: 42
