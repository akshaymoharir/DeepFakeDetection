# ============================================================
# Train Configuration — HSF-CVIT DeepFake Detection
# ============================================================
# Switch data.config to dataset_config.yaml once FF++ is ready.
# All paths are relative to the project root.

# ------ Model ------
model:
  name: hsf_cvit
  pretrained_spatial: true          # download ImageNet weights for EfficientNet-B4
  freeze_spatial_epochs: 2          # freeze EfficientNet-B4 for first N epochs (warm up freq branch)
  spatial_out_dim: 512              # projection dim from spatial branch
  freq_out_dim: 256                 # projection dim from frequency branch
  fusion_heads: 4                   # cross-attention heads
  fusion_dim: 256                   # internal transformer dim
  dropout: 0.3

# ------ Data ------
data:
  config: configs/dataset_config.yaml
  frames_per_clip: 1                # standard frame-level training: one sampled frame per clip per item
  image_size: 224
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4
  balance_strategy: weighted_sampler  # none | weighted_sampler
  # FF++ manipulation methods to include (any subset available under data/frames)
  methods:
    - Deepfakes
    - Face2Face
    - FaceSwap
    - NeuralTextures
  real_dir: real

# ------ Training ------
training:
  epochs: 60
  batch_size: 32
  optimizer: adamw                  # adamw | adam | sgd
  lr: 3.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 5
  lr_schedule: cosine               # cosine | step | plateau
  gradient_clip: 1.0
  label_smoothing: 0.05
  amp: true                         # mixed-precision (fp16) — requires CUDA

# ------ Evaluation ------
evaluation:
  decision_threshold: 0.5
  deterministic_eval: true         # use fixed frame selection for val/test
  eval_frames_per_clip: 1          # stable single-frame evaluation per clip
  eval_frame_strategy: center      # center | uniform
  optimize_threshold: true
  threshold_metric: balanced_accuracy
  threshold_min: 0.05
  threshold_max: 0.95
  threshold_step: 0.01
  save_reports: true
  report_dir: outputs/evaluation

# ------ Checkpoints ------
checkpoints:
  dir: outputs/checkpoints
  save_every: 5                     # epochs between periodic saves
  early_stop_patience: 10           # stop if val AUC doesn't improve for N epochs
  keep_last: 3                      # keep only the last N periodic checkpoints

# ------ Logging ------
logging:
  tensorboard_dir: outputs/runs
  log_interval: 10                  # log metrics every N batches
  csv_log: outputs/training_log.csv

# ------ Reproducibility ------
seed: 42
